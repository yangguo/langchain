name: Sync Fork

on:
  schedule:
    - cron:  '0 */6 * * *' # Runs every 6 hours, adjust as needed
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: 'main' # Your default branch, change if necessary
          fetch-depth: 0 # Fetch all history for all tags and branches

      - name: Sync fork
        uses: tgymnich/fork-sync@v1.1
        with:
          owner: langchain-ai
          repository: langchain
          base: master # Typically main or master
          head: master # The branch you want to sync with, usually the default branch of the original repo
          github_token: ${{ secrets.GITHUB_TOKEN }}
